services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: goten_layered
      POSTGRES_USER: goten
      POSTGRES_PASSWORD: goten
    ports:
      - "5433:5432" # 5433 host-side to avoid clashing with examples/basic
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goten"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - layered-postgres-data:/var/lib/postgresql/data

volumes:
  layered-postgres-data:
