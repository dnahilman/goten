services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: goten
      POSTGRES_USER: goten
      POSTGRES_PASSWORD: goten
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goten"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
